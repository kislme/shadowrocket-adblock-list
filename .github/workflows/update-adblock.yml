name: Update Shadowrocket AdBlock Lists

on:
  workflow_dispatch:
  schedule:
    - cron: "20 1 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build lists
        run: python scripts/build_adblock_list.py

      - name: Commit updated lists
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Shadowrocket adblock lists"
          file_pattern: "adblock_shadowrocket_*.list"
